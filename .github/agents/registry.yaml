# registry.yaml — Machine-readable agent index
# Auto-generated from CONTRACT blocks. Source of truth for OR-3 DAG walker.
# Do NOT edit by hand — regenerate from agent CONTRACT blocks.
#
# Validation rules (enforced at pre-flight):
#   1. Every agent.file must exist on disk
#   2. Every name in depends_on must reference an agent in this file
#   3. No cycles in the dependency graph (topological sort must succeed)
#   4. Every pipeline_step agent must be reachable from at least one root (no orphans)
#   5. Standalone agents (pipeline_step: null) are excluded from pipeline DAG
#   6. critical defaults to true if omitted. Non-critical agents (critical: false)
#      use warn_on_failure degradation — pipeline continues on failure with a warning.
#   7. depends_on_any (optional): OR-dependency list. At least one named agent
#      must complete before this agent runs. Contrast with depends_on (AND — all
#      must complete). If both are present, all AND deps + at least one OR dep
#      must be satisfied.

version: 1
agents:
  # ── Phase 1: Framing & Exploration ─────────────────────────────

  - name: question-framing
    file: .github/agents/question-framing.agent.md
    pipeline_step: 1
    critical: true
    depends_on: []
    inputs:
      - BUSINESS_CONTEXT
      - PRODUCT_DESCRIPTION
    outputs:
      - outputs/question_brief_{{DATE}}.md
    knowledge_context: []

  - name: data-explorer
    file: .github/agents/data-explorer.agent.md
    pipeline_step: 2
    critical: true
    depends_on:
      - question-framing
    inputs:
      - QUESTION_BRIEF
      - DATASETS
    outputs:
      - outputs/data_feasibility_{{DATE}}.md
    knowledge_context:
      - .knowledge/datasets/{active}/schema.md
      - .knowledge/datasets/{active}/quirks.md

  - name: hypothesis
    file: .github/agents/hypothesis.agent.md
    pipeline_step: 3
    critical: true
    depends_on:
      - question-framing
      - data-explorer
    inputs:
      - QUESTION_BRIEF
      - DATA_FEASIBILITY
    outputs:
      - outputs/hypothesis_doc_{{DATE}}.md
    knowledge_context: []

  # ── Phase 4: Analysis ─────────────────────────────────────────────

  - name: descriptive-analytics
    file: .github/agents/descriptive-analytics.agent.md
    pipeline_step: 5
    critical: true
    depends_on:
      - data-explorer
    inputs:
      - DATASET
      - QUESTION_BRIEF
      - HYPOTHESIS_DOC
      - DATA_FEASIBILITY
      - FOCUS_AREA
    outputs:
      - outputs/analysis_report_{{DATE}}.md
      - outputs/charts/*.png
      - working/data_readiness_check.md
    knowledge_context:
      - .knowledge/datasets/{active}/schema.md
      - .knowledge/datasets/{active}/quirks.md

  - name: overtime-trend
    file: .github/agents/overtime-trend.agent.md
    pipeline_step: 5
    critical: true
    depends_on:
      - data-explorer
    inputs:
      - DATASET
      - TIME_COLUMN
      - METRIC_COLUMNS
      - GRANULARITY
      - SEGMENTS
      - ANALYSIS_CONTEXT
    outputs:
      - outputs/trend_report_{{DATE}}.md
      - outputs/charts/*.png
      - working/timeseries_prepared.csv
    knowledge_context:
      - .knowledge/datasets/{active}/schema.md
      - .knowledge/datasets/{active}/quirks.md

  - name: cohort-analysis
    file: .github/agents/cohort-analysis.agent.md
    pipeline_step: 5
    critical: true
    depends_on:
      - data-explorer
    inputs:
      - COHORT_DIMENSION
      - RETENTION_EVENT
      - PERIODS
      - DATASET
      - DATA_FEASIBILITY
    outputs:
      - working/cohort_analysis_{{DATASET}}.md
      - working/charts/retention_heatmap.png
      - working/charts/retention_curves.png
      - working/charts/ltv_curves.png
    knowledge_context:
      - .knowledge/datasets/{active}/schema.md
      - .knowledge/datasets/{active}/quirks.md

  # ── Phase 5: Investigation ────────────────────────────────────────

  - name: root-cause-investigator
    file: .github/agents/root-cause-investigator.agent.md
    pipeline_step: 6
    critical: true
    depends_on:
      - descriptive-analytics
    inputs:
      - METRIC
      - OBSERVATION
      - DATASET
      - DIMENSIONS
      - ANALYSIS_RESULTS
      - KNOWN_CONTEXT
    outputs:
      - working/investigation_{{DATASET}}.md
      - working/investigation_confirm.md
    knowledge_context:
      - .knowledge/datasets/{active}/schema.md
      - .knowledge/datasets/{active}/quirks.md

  # ── Phase 6: Validation & Sizing ──────────────────────────────────

  - name: validation
    file: .github/agents/validation.agent.md
    pipeline_step: 7
    critical: true
    depends_on:
      - root-cause-investigator
    inputs:
      - ANALYSIS_CODE
      - ANALYSIS_RESULTS
      - DATA_SOURCE
      - VALIDATION_SCOPE
    outputs:
      - outputs/validation_{{DATASET_NAME}}_{{DATE}}.md
    knowledge_context:
      - .knowledge/datasets/{active}/schema.md
      - .knowledge/datasets/{active}/quirks.md

  - name: opportunity-sizer
    file: .github/agents/opportunity-sizer.agent.md
    pipeline_step: 8
    critical: false
    depends_on:
      - validation
    inputs:
      - OPPORTUNITY
      - ANALYSIS_RESULTS
      - DATASET
      - ASSUMPTIONS
      - VALUE_METRICS
    outputs:
      - working/sizing_{{OPPORTUNITY_SLUG}}.md
    knowledge_context:
      - .knowledge/datasets/{active}/schema.md
      - .knowledge/datasets/{active}/quirks.md

  # ── Phase 7: Storytelling & Presentation ──────────────────────────

  - name: story-architect
    file: .github/agents/story-architect.agent.md
    pipeline_step: 9
    critical: true
    depends_on:
      - opportunity-sizer
    inputs:
      - ANALYSIS_RESULTS
      - QUESTION_BRIEF
      - DATASET
      - CONTEXT
    outputs:
      - working/storyboard_{{DATASET}}.md
    knowledge_context:
      - .knowledge/datasets/{active}/manifest.yaml

  - name: narrative-coherence-reviewer
    file: .github/agents/narrative-coherence-reviewer.agent.md
    pipeline_step: 10
    critical: false
    depends_on:
      - story-architect
    inputs:
      - STORYBOARD
      - CHART_FILES
      - NARRATIVE
      - DATASET
    outputs:
      - working/coherence_review_{{DATASET}}.md
    knowledge_context: []

  - name: chart-maker
    file: .github/agents/chart-maker.agent.md
    pipeline_step: 12
    critical: true
    depends_on:
      - narrative-coherence-reviewer
    inputs:
      - DATA
      - CHART_SPEC
      - THEME
      - OUTPUT_NAME
    outputs:
      - outputs/charts/{{OUTPUT_NAME}}.png
      - outputs/charts/{{OUTPUT_NAME}}.svg
    knowledge_context:
      - .knowledge/datasets/{active}/manifest.yaml

  - name: visual-design-critic
    file: .github/agents/visual-design-critic.agent.md
    pipeline_step: 13
    critical: false
    depends_on:
      - chart-maker
    inputs:
      - CHART_FILES
      - STORYBOARD
      - DATASET
      - THEME
      - DECK_FILE
    outputs:
      - working/design_review_{{DATASET}}.md
    knowledge_context:
      - .knowledge/datasets/{active}/manifest.yaml

  - name: chart-maker-fixes
    file: .github/agents/chart-maker.agent.md
    pipeline_step: 14
    critical: true
    depends_on:
      - visual-design-critic
    inputs:
      - DATA
      - CHART_SPEC
      - THEME
      - OUTPUT_NAME
      - FIX_REPORT
    outputs:
      - outputs/charts/{{OUTPUT_NAME}}.png
    knowledge_context:
      - .knowledge/datasets/{active}/manifest.yaml
    # Only runs when visual-design-critic verdict is APPROVED WITH FIXES.
    # Skipped when verdict is APPROVED. Pipeline HALTs when NEEDS REVISION.
    conditional: true

  - name: storytelling
    file: .github/agents/storytelling.agent.md
    pipeline_step: 15
    critical: true
    depends_on:
      - visual-design-critic
    inputs:
      - ANALYSIS_RESULTS
      - QUESTION_BRIEF
      - AUDIENCE
      - STORYBOARD
      - TONE
    outputs:
      - outputs/narrative_{{DATASET_NAME}}_{{DATE}}.md
    knowledge_context:
      - .knowledge/datasets/{active}/manifest.yaml

  - name: deck-creator
    file: .github/agents/deck-creator.agent.md
    pipeline_step: 16
    critical: true
    depends_on:
      - storytelling
    inputs:
      - NARRATIVE
      - CHARTS
      - THEME
      - FORMAT
      - CONTEXT
      - AUDIENCE
      - STORYBOARD
      - DECK_TITLE
    outputs:
      - outputs/deck_{{DATASET_NAME}}_{{DATE}}.md
      - outputs/deck_{{DATASET_NAME}}_{{DATE}}.marp.md
      - outputs/deck_{{DATASET_NAME}}_{{DATE}}.pdf
      - outputs/deck_{{DATASET_NAME}}_{{DATE}}.html
    knowledge_context:
      - .knowledge/datasets/{active}/manifest.yaml

  - name: visual-design-critic-slides
    file: .github/agents/visual-design-critic.agent.md
    pipeline_step: 17
    critical: false
    depends_on:
      - deck-creator
    inputs:
      - DECK_FILE
      - THEME
      - CHART_FILES
      - STORYBOARD
      - DATASET
    outputs:
      - working/slide_review_{{DATASET}}.md
    knowledge_context:
      - .knowledge/datasets/{active}/manifest.yaml

  # ── Phase 8: Close the Loop ────────────────────────────────────────

  - name: close-the-loop
    file: .github/skills/close-the-loop/SKILL.md
    pipeline_step: 18
    critical: true
    depends_on:
      - visual-design-critic-slides
    inputs:
      - ANALYSIS_RESULTS
      - RECOMMENDATIONS
      - DECK_FILE
    outputs:
      - outputs/close_the_loop_{{DATE}}.md
    knowledge_context: []

  
  # ── Standalone (no pipeline_step) ─────────────────────────────────

  - name: experiment-designer
    file: .github/agents/experiment-designer.agent.md
    pipeline_step: null
    critical: true
    depends_on:
      - hypothesis
    inputs:
      - HYPOTHESIS
      - DATASET
      - CONSTRAINTS
    outputs:
      - working/experiment_design_{{HYPOTHESIS_SLUG}}.md
    knowledge_context:
      - .knowledge/datasets/{active}/schema.md
      - .knowledge/datasets/{active}/quirks.md

  - name: comms-drafter
    file: .github/agents/comms-drafter.agent.md
    pipeline_step: null
    critical: false
    depends_on_any:
      - storytelling
      - validation
    inputs:
      - NARRATIVE
      - FINDINGS
      - RECOMMENDATIONS
      - CONFIDENCE_GRADE
      - AUDIENCE
      - EXPORT_FORMAT
    outputs:
      - working/comms_draft.md
    knowledge_context: []
